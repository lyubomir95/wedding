<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нашата сватба</title>

<style>
body{
font-family: 'Georgia', serif;
margin:0;
background:#f7f7f7;
text-align:center;
color:#333;
}

header{
background:url('https://images.unsplash.com/photo-1519741497674-611481863552') center/cover;
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
color:white;
}

header h1{
font-size:60px;
margin:0;
}

header h2{
font-weight:normal;
}

section{
padding:60px 20px;
}

.timeline{
max-width:600px;
margin:auto;
text-align:left;
}

.event{
margin-bottom:20px;
padding:15px;
background:white;
border-radius:10px;
}

button{
padding:12px 25px;
border:none;
background:#c8a97e;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

form{
max-width:400px;
margin:auto;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
}

footer{
padding:20px;
background:#eee;
}
</style>
</head>

<body>

<header>
<h1>Мария & Иван</h1>
<h2>15 Юни 2026</h2>
<p>Очакваме ви на нашата сватба</p>
</header>

<section>
<h2>Кога?</h2>
<p>15 Юни 2026 • 17:00</p>
</section>

<section>
<h2>Къде?</h2>
<p>Ресторант Панорама, София</p>

<iframe
src="https://maps.google.com/maps?q=sofia&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%" height="300"></iframe>
</section>

<section>
<h2>Програма</h2>

<div class="timeline">

<div class="event">
<strong>17:00</strong><br>
Церемония
</div>

<div class="event">
<strong>18:00</strong><br>
Коктейл
</div>

<div class="event">
<strong>19:30</strong><br>
Вечеря и празненство
</div>

</div>

</section>

<section>
<h2>Потвърдете присъствието си</h2>

<form>
<input type="text" placeholder="Вашето име">

<select>
<option>Ще присъствам</option>
<option>Няма да мога</option>
</select>

<button type="submit">Изпрати</button>
</form>

</section>

<footer>
<p>С любов – Мария и Иван</p>
</footer>

</body>
</html>
